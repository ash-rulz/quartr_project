companies:
  - AAPL
  - META
  - GOOGL
  - AMZN
  - NFLX
  - GS

endpoints:
  sec_ticker_url: "https://www.sec.gov/files/company_tickers.json"
  sec_submissions_url: "https://data.sec.gov/submissions/CIK{cik}.json"
  sec_filing_url: "https://www.sec.gov/Archives/edgar/data/{cik}/{accession_number}/{filename}"

requests:
  timeout_seconds: 30 # Timeout for HTTP requests in seconds
  retry_total: 3 # Total number of retries for failed HTTP requests
  retry_backoff_factor: 1 # Backoff factor for retries (e.g., 1 means wait 1 second before first retry, 2 seconds before second retry, etc.)

output:
  form_10k_directory: ".\\output\\"

local_directory:
  wkhtmltopdf_directory: 'C:\\Program Files\\wkhtmltopdf\\bin\\wkhtmltopdf.exe'